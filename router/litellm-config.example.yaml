# LiteLLM proxy config TEMPLATE for the divide-and-conquer fleet.
#
#   cp litellm-config.example.yaml litellm-config.yaml   # gitignored
#
# Keep host addresses and keys out of the repo: reference env vars
# (os.environ/VAR) or edit only your local litellm-config.yaml copy.
# fleetd keeps model_list in sync as deployments come and go (M3);
# until then, register live servers by hand in your local copy.

model_list:
  # --- S1: 4x3090 rig, Step-3.5-Flash GGUF q3 via llama.cpp ---
  - model_name: tier:s1
    litellm_params:
      model: openai/step-3.5-flash
      api_base: os.environ/DNC_S1_API_BASE
      api_key: none
    model_info:
      dnc_squad: s1

  # --- S0: frontier APIs ---
  - model_name: tier:s0
    litellm_params:
      model: openai/glm-4.7
      api_base: https://api.z.ai/api/paas/v4
      api_key: os.environ/GLM_API_KEY
    model_info:
      dnc_squad: s0
  - model_name: tier:s0
    litellm_params:
      model: xai/grok-4
      api_key: os.environ/XAI_API_KEY
    model_info:
      dnc_squad: s0

  # --- S2: 32GB card (RTX 5090 / V100 / MI50). Recommended: Qwen3.6-27B 4-bit + q8 KV
  # @ full 262k context (~28-29GB — fits via hybrid/linear attention). See
  # docs/model-selection-2026.md. RTX 5090+vLLM preferred; llama.cpp GGUF q4 portable. ---
  - model_name: tier:s2
    litellm_params:
      model: openai/qwen3.6-27b
      api_base: os.environ/DNC_S2_API_BASE
      api_key: none
    model_info:
      dnc_squad: s2

  # --- S3: wide/cheap squad via llama.cpp (BC-250 fleet). ---
  # FAILOVER NEEDS >=2 NODES: the gateway can only route around a downed/at-capacity
  # S3 host if there is another S3 deployment to fall to. Register EVERY BC-250 node
  # as its own tier:s3 entry (distinct model_info.id + api_base). With one node, a
  # failure falls back to tier:s2 (see router_settings.fallbacks), not sideways.
  # BC-250 is single-slot (--parallel 1): the custom strategy treats one in-flight
  # request as "busy" (SQUAD_CONCURRENCY[s3]=1) and spreads instead of dogpiling.
  - model_name: tier:s3
    litellm_params:
      model: openai/qwen3.6-35b-reap
      api_base: os.environ/DNC_S3_API_BASE
      api_key: none
    model_info:
      id: s3-node-01
      dnc_squad: s3
  # - model_name: tier:s3        # add one block PER BC-250 node for real failover
  #   litellm_params:
  #     model: openai/qwen3.6-35b-reap
  #     api_base: os.environ/DNC_S3_API_BASE_02
  #     api_key: none
  #   model_info:
  #     id: s3-node-02
  #     dnc_squad: s3

  # --- embeddings: Qwen3-Embedding-0.6B Q8_0 ---
  # PRIMARY: self-hosted on the control-plane 9700T CPU (llama.cpp --embeddings).
  # Benchmarked query p50 39ms / chunk p50 44ms with -t 4 — fast enough to be primary,
  # not just a fallback (see tools/bench_embed.py, PLAN.md §6). A GPU node or DeepInfra
  # is optional redundancy: add more embed:qwen3 entries and LiteLLM load-balances.
  # Point DNC_EMBED_API_BASE at the local llama-server (e.g. http://127.0.0.1:8090/v1).
  - model_name: embed:qwen3
    litellm_params:
      model: openai/qwen3-embedding-0.6b
      api_base: os.environ/DNC_EMBED_API_BASE
      api_key: os.environ/DNC_EMBED_API_KEY   # "none" for self-host; real key only for DeepInfra
    model_info:
      dnc_squad: s3
      mode: embedding

  # tier:auto is resolved by the custom strategy: register every squad deployment
  # under it; pick_tier() chooses the squad, then the strategy filters by dnc_squad.
  - model_name: tier:auto
    litellm_params: { model: openai/glm-4.7, api_base: https://api.z.ai/api/paas/v4, api_key: os.environ/GLM_API_KEY }
    model_info: { dnc_squad: s0 }
  - model_name: tier:auto
    litellm_params: { model: openai/step-3.5-flash, api_base: os.environ/DNC_S1_API_BASE, api_key: none }
    model_info: { dnc_squad: s1 }
  - model_name: tier:auto
    litellm_params: { model: openai/qwen3-8b, api_base: os.environ/DNC_S2_API_BASE, api_key: none }
    model_info: { dnc_squad: s2 }
  - model_name: tier:auto
    litellm_params: { model: openai/qwen3-4b, api_base: os.environ/DNC_S3_API_BASE, api_key: none }
    model_info: { dnc_squad: s3 }

# NOTE: LiteLLM's proxy YAML has NO key to register a custom routing strategy — it is
# a Router (SDK) feature. So `tier:auto` (DncRoutingStrategy: complexity tiers +
# prefix-hash affinity) is served by the launcher `python -m dnc_router.serve`, which
# wraps the proxy and attaches the strategy via Router.set_custom_routing_strategy().
# Plain `litellm --config` also works but only routes the explicit tiers (tier:s0..s3),
# not tier:auto. (Verified live on the control-plane box: tier:auto routed
# complexity=max -> S0 and complexity=high -> S1.)

# --- Gateway-level auto-heal (LB-style health checks + failover) ---
# Distinguish a DOWN host from a SLOW one by keeping the liveness signal SEPARATE
# from the work request:
#   * DOWN  -> TCP refused / health probe fails -> detected in ms, cools the node down.
#   * SLOW  -> request in flight for minutes, but /health still returns 200 the whole
#             time (including through a multi-minute cold prefill, which emits NO tokens).
# So `timeout` must be generous enough for worst-case prefill+gen (never use it as the
# health signal), while cooldown/retry react to connection-level failures and the
# background health check reacts to a truly unreachable host.
router_settings:
  num_retries: 2                 # on failure, retry -> strategy re-picks (skips the cooled-down host)
  timeout: 900                   # per-request ceiling; sized for worst-case BC-250 prefill+gen, NOT liveness
  allowed_fails: 2               # failures within the window before a deployment is cooled down
  cooldown_time: 60              # seconds a failing deployment is pulled from rotation
  # If a whole tier is unreachable, fall UP a tier rather than error (S3->S2->S1).
  fallbacks:
    - {"tier:s3": ["tier:s2"]}
    - {"tier:s2": ["tier:s1"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Background liveness probe: pings each deployment's /health on an interval and drops
  # unreachable ones from rotation. This is the keepalive that tells "down" from "slow"
  # — it keeps answering while a node is mid-generation, and fails fast when it's gone.
  background_health_checks: true
  health_check_interval: 30
